<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Title shown on browser tab -->
    <title>Quarks Casino Craps Game</title>

    <!-- Link to external JavaScript file -->
    <script src="code.js"></script>

    <style>
        /* Style the page */
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            background-color:#1b1b1b;
            color:white;
            margin-top:50px;
        }

        /* Style the casino box */
        .casino{
            width:500px;
            margin:auto;
            padding:20px;
            background-color:#2d2d2d;
            border-radius:10px;
        }

        /* Style button */
        button{
            padding:10px 20px;
            font-size:18px;
            cursor:pointer;
        }

        /* Style results area */
        #results{
            margin-top:20px;
            font-size:20px;
        }
    </style>
</head>

<body>

    <!-- Main casino container -->
    <div class="casino">

        <!-- Heading -->
        <h1>🎲 Quarks Casino 🎲</h1>

        <!-- Instructions -->
        <p>Press Play to roll the dice!</p>

        <!-- Form required by assignment -->
        <form onsubmit="playGame(); return false;">

            <!-- Submit button -->
            <button type="submit">Play Craps</button>

        </form>

        <!-- Output area -->
        <div id="results"></div>

        <!-- Bonus output from second function -->
        <div id="message"></div>

    </div>

</body>
</html>
